name: Deploy Pitch & Buy to AWS Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_BACKEND_IMAGE_NAME }}
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_FRONTEND_IMAGE_NAME }}

concurrency:
  group: deploy-pitchbuy-lightsail
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync deployment files to Lightsail
        env:
          PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          APP_PATH: ${{ secrets.LIGHTSAIL_APP_PATH }}
          COMPOSE_PROJECT_NAME: ${{ secrets.COMPOSE_PROJECT_NAME }}
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
        run: |
          set -eu
          : "${COMPOSE_PROJECT_NAME:=pitchbuy}"
          : "${BACKEND_PORT:=3000}"
          : "${FRONTEND_PORT:=8080}"

          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          cat > .deploy.env <<ENVFILE
          COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME
          BACKEND_IMAGE=$BACKEND_IMAGE
          FRONTEND_IMAGE=$FRONTEND_IMAGE
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          DATABASE_URL=$DATABASE_URL
          BACKEND_PORT=$BACKEND_PORT
          FRONTEND_PORT=$FRONTEND_PORT
          ENVFILE

          tar czf - docker-compose.lightsail.yml .env.lightsail.example .deploy.env \
            | ssh -i ~/.ssh/id_rsa "$USER@$HOST" "mkdir -p '$APP_PATH' && tar xzf - -C '$APP_PATH'"

      - name: Deploy to Lightsail
        env:
          PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          APP_PATH: ${{ secrets.LIGHTSAIL_APP_PATH }}
          COMPOSE_PROJECT_NAME: ${{ secrets.COMPOSE_PROJECT_NAME }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -eu
          : "${COMPOSE_PROJECT_NAME:=pitchbuy}"

          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          printf '%s' "$DOCKER_PASSWORD" | ssh -i ~/.ssh/id_rsa "$USER@$HOST" "docker login -u \"$DOCKER_USERNAME\" --password-stdin"

          ssh -i ~/.ssh/id_rsa "$USER@$HOST" "
            set -eu
            cd '$APP_PATH'
            mv .deploy.env .env

            docker compose -f docker-compose.lightsail.yml pull
            docker compose -f docker-compose.lightsail.yml up -d

            docker compose -f docker-compose.lightsail.yml ps
            docker compose -f docker-compose.lightsail.yml logs backend --tail=80
            docker compose -f docker-compose.lightsail.yml logs frontend --tail=40
          "